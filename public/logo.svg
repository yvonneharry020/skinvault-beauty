<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 258 68" fill="none">
  <defs>
    <!-- Warm glow gradient for the serum drop -->
    <linearGradient id="dropFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c5a8"/>
      <stop offset="100%" stop-color="#c47a5a"/>
    </linearGradient>
    <!-- Soft fill for serum liquid in tube -->
    <linearGradient id="liquidFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2dece"/>
      <stop offset="100%" stop-color="#ddb898"/>
    </linearGradient>
    <!-- Bulb gradient -->
    <linearGradient id="bulbFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c5a8"/>
      <stop offset="100%" stop-color="#c8957a"/>
    </linearGradient>
  </defs>

  <!-- ══ SERUM DROPPER ICON ══════════════════════════════════════════ -->

  <!-- Rubber bulb (soft, rounded top) -->
  <ellipse cx="19" cy="11" rx="9.5" ry="6.5" fill="url(#bulbFill)" opacity="0.95"/>
  <!-- Bulb inner shine -->
  <ellipse cx="16.5" cy="9" rx="3" ry="2" fill="white" opacity="0.22"/>

  <!-- Glass dropper tube body -->
  <rect x="15.5" y="16" width="7" height="26" rx="3.5" stroke="#c4907a" stroke-width="1.2" fill="white" fill-opacity="0.3"/>

  <!-- Serum liquid inside tube -->
  <rect x="17" y="23" width="4" height="17" rx="2" fill="url(#liquidFill)" opacity="0.85"/>

  <!-- Narrow pipette tip -->
  <path d="M17.5 42 C18 44 19 46.5 19 46.5 C19 46.5 20 44 20.5 42 Z" fill="#c4907a" opacity="0.9"/>
  <line x1="19" y1="42" x2="19" y2="47" stroke="#c4907a" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Signature serum drop (teardrop, the hero element) -->
  <path d="M19 48.5 C16.8 52 14.8 54.5 14.8 57.2 C14.8 60.4 16.6 63 19 63 C21.4 63 23.2 60.4 23.2 57.2 C23.2 54.5 21.2 52 19 48.5 Z" fill="url(#dropFill)"/>

  <!-- Glowy highlight inside the drop -->
  <ellipse cx="17.2" cy="55.5" rx="1.1" ry="2.2" fill="white" opacity="0.38"/>
  <ellipse cx="17.8" cy="54.2" rx="0.5" ry="0.9" fill="white" opacity="0.2"/>

  <!-- ══ WORDMARK ════════════════════════════════════════════════════ -->

  <!-- SKINVAULT in elegant serif -->
  <text
    x="42"
    y="37"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="22"
    font-weight="400"
    letter-spacing="5"
    fill="#c4876a"
  >SKINVAULT</text>

  <!-- Delicate separator line -->
  <line x1="42" y1="43.5" x2="250" y2="43.5" stroke="#d4a882" stroke-width="0.65" opacity="0.7"/>

  <!-- BEAUTY in warm rose-gold, wide tracking -->
  <text
    x="43"
    y="57"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="8.5"
    font-weight="400"
    letter-spacing="9.5"
    fill="#c4876a"
  >BEAUTY</text>

</svg>
